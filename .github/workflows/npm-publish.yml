name: npm Package Publish

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'The tag of the release being published (e.g. alpha, beta, next, latest)'
        required: true
        default: 'alpha'

jobs:
  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '24.x'
      - run: npm ci
      - run: npm run lint:all
      - run: npm run build
      - run: npm run test

  publish-npm:
    permissions:
      id-token: write
      contents: read
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '24.x'
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - run: npm publish --access public --tag ${{ github.event.inputs.release_tag }}
